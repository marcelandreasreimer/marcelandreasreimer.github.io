<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Nexus VJ Overdrive</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.7/dat.gui.min.js"></script>
</head>
<body>
    <canvas id="vjCanvas"></canvas>

    <script>
        // --- IMPROVED PERLIN NOISE ---
        const Perlin = (function() {
            const P = new Array(512);
            const permutation = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,205,181,112,109,66,146,189,218,100,44,25,128,144,157,115,14,185,176,161,119,210,245,127,4,150,255,107,241,254,173,202,196,180,187,98,108,110,79,113,224,232,178,188,204,195,38,123,167,251,124,206,49,118,143,84,58,154,193,2,72,2,106,1,192,125,193,148,116,24,50,179,113,85,162,130,208,236,215,170,46,239,34,12,19,145,209,132,60,121,16,135,138,63,105,83,238,207,191,122,17,226,158,249,41,141,250,199,25,129,242,244,93,184,126,18,133,169,39,186,213,235,101,253,152,89,43,198,70,102,78,231,13,250,21,13,240,240,229,13,240,240];
            for (let i = 0; i < 256; i++) P[i] = P[i + 256] = permutation[i];
            function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
            function lerp(t, a, b) { return a + t * (b - a); }
            function grad(hash, x, y, z) {
                const h = hash & 15;
                const u = h < 8 ? x : y;
                const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            }
            return {
                get: function(x, y, z) {
                    let X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
                    x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
                    let u = fade(x), v = fade(y), w = fade(z);
                    let A = P[X]+Y, AA = P[A]+Z, AB = P[A+1]+Z, B = P[X+1]+Y, BA = P[B]+Z, BB = P[B+1]+Z;
                    return lerp(w, lerp(v, lerp(u, grad(P[AA], x, y, z), grad(P[BA], x-1, y, z)), lerp(u, grad(P[AB], x, y-1, z), grad(P[BB], x-1, y-1, z))), lerp(v, lerp(u, grad(P[AA+1], x, y, z-1), grad(P[BA+1], x-1, y, z-1)), lerp(u, grad(P[AB+1], x, y-1, z-1), grad(P[BB+1], x-1, y-1, z-1))));
                }
            };
        })();

        // --- SETUP ---
        const canvas = document.getElementById('vjCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, geometries = [];
        let mouseX = 0, mouseY = 0, targetMouseX = 0, targetMouseY = 0;

        // UPDATED DEFAULTS FROM YOUR SCREENSHOT
        const GUI_PARAMS = {
            bloom: 36,
            trailFade: 0.02,
            lineWidth: 2.3,
            baseColor: '#4545f0',
            rainbowMode: true,
            gridSize: 14,
            morphSpeed: 1.0,
            rotationSpeed: 5.0,
            warpStrength: 1000,
            noiseScale: 0.003,
            hueSpeed: 1,
            init: generateGeometries
        };

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            generateGeometries();
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });

        function generateGeometries() {
            geometries = [];
            const spacingX = width / GUI_PARAMS.gridSize;
            const spacingY = height / GUI_PARAMS.gridSize;

            for (let i = 0; i < GUI_PARAMS.gridSize; i++) {
                for (let j = 0; j < GUI_PARAMS.gridSize; j++) {
                    geometries.push({
                        baseX: (i + 0.5) * spacingX,
                        baseY: (j + 0.5) * spacingY,
                        radius: Math.random() * 80, // Dynamic radius within max range
                        angle: Math.random() * Math.PI * 2,
                        type: ['circle', 'triangle', 'square', 'cross'][Math.floor(Math.random() * 4)],
                        noiseOffset: Math.random() * 1000,
                        hue: Math.random() * 360
                    });
                }
            }
        }

        function drawShape(type, size, angle) {
            ctx.rotate(angle);
            ctx.beginPath();
            if (type === 'circle') {
                ctx.arc(0, 0, size, 0, Math.PI * 2);
            } else if (type === 'triangle') {
                for(let i=0; i<3; i++) {
                    const a = (i * Math.PI * 2) / 3;
                    ctx.lineTo(Math.cos(a) * size, Math.sin(a) * size);
                }
            } else if (type === 'square') {
                ctx.rect(-size/2, -size/2, size, size);
            } else if (type === 'cross') {
                ctx.moveTo(-size, 0); ctx.lineTo(size, 0);
                ctx.moveTo(0, -size); ctx.lineTo(0, size);
            }
            ctx.closePath();
            ctx.stroke();
        }

        function animate(time) {
            requestAnimationFrame(animate);

            mouseX += (targetMouseX - mouseX) * 0.1;
            mouseY += (targetMouseY - mouseY) * 0.1;

            ctx.fillStyle = `rgba(5, 5, 5, ${GUI_PARAMS.trailFade})`;
            ctx.fillRect(0, 0, width, height);

            const t = time * 0.001 * GUI_PARAMS.morphSpeed;

            geometries.forEach((g, i) => {
                const nX = Perlin.get(g.baseX * GUI_PARAMS.noiseScale, g.baseY * GUI_PARAMS.noiseScale, t);
                const nY = Perlin.get(g.baseY * GUI_PARAMS.noiseScale, g.baseX * GUI_PARAMS.noiseScale, t + g.noiseOffset);
                
                let curX = g.baseX + nX * 150;
                let curY = g.baseY + nY * 150;

                const dx = mouseX - curX;
                const dy = mouseY - curY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const force = Math.max(0, (GUI_PARAMS.warpStrength - dist) / GUI_PARAMS.warpStrength);
                
                curX -= dx * force * 0.5;
                curY -= dy * force * 0.5;

                const spin = t * GUI_PARAMS.rotationSpeed + (force * 5);
                const hue = GUI_PARAMS.rainbowMode ? (g.hue + time * 0.05 * GUI_PARAMS.hueSpeed) % 360 : GUI_PARAMS.baseColor;
                
                ctx.save();
                ctx.translate(curX, curY);
                
                ctx.strokeStyle = GUI_PARAMS.rainbowMode ? `hsl(${hue}, 100%, 60%)` : GUI_PARAMS.baseColor;
                ctx.lineWidth = GUI_PARAMS.lineWidth + (force * 3);
                ctx.shadowBlur = GUI_PARAMS.bloom + (force * 20);
                ctx.shadowColor = ctx.strokeStyle;
                
                const sizeScale = 1 + Math.sin(t + g.noiseOffset) * 0.3 + force;
                drawShape(g.type, (g.radius * sizeScale) * 0.8, spin + g.angle);
                
                ctx.restore();
            });
        }

        // --- GUI SETUP (MATCHING SCREENSHOT LABELS) ---
        const gui = new dat.GUI();
        const f1 = gui.addFolder('Visuals');
        f1.add(GUI_PARAMS, 'bloom', 0, 100).name('Neon Intensity');
        f1.add(GUI_PARAMS, 'trailFade', 0.01, 0.5).name('Motion Blur');
        f1.add(GUI_PARAMS, 'lineWidth', 1, 10).name('Stroke Width');
        f1.addColor(GUI_PARAMS, 'baseColor').name('Static Color');
        f1.add(GUI_PARAMS, 'rainbowMode').name('Psychedelic');
        f1.open();

        const f2 = gui.addFolder('Dynamics');
        f2.add(GUI_PARAMS, 'gridSize', 4, 30).step(1).name('Complexity').onFinishChange(generateGeometries);
        f2.add(GUI_PARAMS, 'morphSpeed', 0, 5).name('Flow Speed');
        f2.add(GUI_PARAMS, 'rotationSpeed', 0, 10).name('Spin Rate');
        f2.add(GUI_PARAMS, 'warpStrength', 100, 2000).name('Mouse Gravity');
        f2.open();

        resizeCanvas();
        animate(0);
    </script>
</body>
</html>
